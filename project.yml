name: P2PMessenger
include: [local.yml]
options:
  deploymentTarget:
    iOS: 17.6
  generateEmptyDirectories: true

targets:
  P2PMessenger:
    type: application
    platform: iOS
    sources: P2PMessenger
    settings:
      GENERATE_INFOPLIST_FILE: YES
      CURRENT_PROJECT_VERSION: 1
      MARKETING_VERSION: 1.0
      TARGETED_DEVICE_FAMILY: "1,2" # iPhone, iPad
      SWIFT_VERSION: 5.0
      ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
      ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
      ASSETCATALOG_COMPILER_GENERATE_ASSET_SYMBOLS: YES
      ASSETCATALOG_COMPILER_GENERATE_SWIFT_ASSET_SYMBOL_EXTENSIONS: YES
      INFOPLIST_KEY_UILaunchScreen_Generation: YES
      INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES

  P2PMessengerTests:
    type: bundle.unit-test
    platform: iOS
    sources: P2PMessengerTests
    dependencies:
      - target: P2PMessenger
    settings:
      GENERATE_INFOPLIST_FILE: YES
      CURRENT_PROJECT_VERSION: 1
      MARKETING_VERSION: 1.0
      SWIFT_VERSION: 5.0

  P2PMessengerUITests:
    type: bundle.ui-testing
    platform: iOS
    sources: P2PMessengerUITests
    dependencies:
      - target: P2PMessenger
    settings:
      GENERATE_INFOPLIST_FILE: YES
      CURRENT_PROJECT_VERSION: 1
      MARKETING_VERSION: 1.0
      SWIFT_VERSION: 5.0

schemes:
  P2PMessenger:
    build:
      targets:
        P2PMessenger: all
    run:
      config: Debug
    archive:
      config: Release

  P2PMessengerTests:
    build:
      targets:
        P2PMessengerTests: [test]
    test:
      targets:
        - P2PMessengerTests

  P2PMessengerUITests:
    build:
      targets:
        P2PMessengerUITests: [test]
    test:
      targets:
        - P2PMessengerUITests


