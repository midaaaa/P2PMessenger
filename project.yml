name: P2PMessenger
include: [local.yml]

options:
  deploymentTarget:
    iOS: 17.0
  developmentLanguage: ru
  generateEmptyDirectories: true

packages:
  Lottie:
    url: https://github.com/airbnb/lottie-spm.git
    from: 4.6.0

targets:
  P2PMessenger:
    type: application
    platform: iOS
    sources: P2PMessenger
    dependencies:
      - package: Lottie
    resources:
      - path: Resources/Localizable.xcstrings
        buildPhase: resources
        defaultLocalization: ru
      - path: P2PMessenger/LottieAnimations
        buildPhase: resources
    settings:
      GENERATE_INFOPLIST_FILE: YES
      INFOPLIST_KEY_UILaunchStoryboardName: LaunchScreen
      CURRENT_PROJECT_VERSION: 1
      MARKETING_VERSION: 1.0
      TARGETED_DEVICE_FAMILY: "1,2" # iPhone, iPad
      SWIFT_VERSION: 5.0
      ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
      ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
      ASSETCATALOG_COMPILER_GENERATE_ASSET_SYMBOLS: YES
      ASSETCATALOG_COMPILER_GENERATE_SWIFT_ASSET_SYMBOL_EXTENSIONS: YES
      INFOPLIST_KEY_UILaunchScreen_Generation: YES
      INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
      INFOPLIST_KEY_NSBluetoothAlwaysUsageDescription: "Bluetooth нужен для поиска собеседников и обмена сообщениями поблизости."
      INFOPLIST_KEY_UIRequiresFullScreen: YES
      INFOPLIST_KEY_UISupportedInterfaceOrientations: UIInterfaceOrientationPortrait
      INFOPLIST_KEY_UISupportedInterfaceOrientations_iPad: UIInterfaceOrientationPortrait
      USE_COMPILER_TO_EXTRACT_SWIFT_STRINGS: YES
      SWIFT_EMIT_LOC_STRINGS: YES
      DEVELOPMENT_LANGUAGE: ru
      LOCALIZATION_REGION: ru_RU

  P2PMessengerTests:
    type: bundle.unit-test
    platform: iOS
    sources: P2PMessengerTests
    dependencies:
      - target: P2PMessenger
    settings:
      GENERATE_INFOPLIST_FILE: YES
      CURRENT_PROJECT_VERSION: 1
      MARKETING_VERSION: 1.0
      SWIFT_VERSION: 5.0
      DEVELOPMENT_LANGUAGE: ru
      LOCALIZATION_REGION: ru_RU

  P2PMessengerUITests:
    type: bundle.ui-testing
    platform: iOS
    sources: P2PMessengerUITests
    dependencies:
      - target: P2PMessenger
    settings:
      GENERATE_INFOPLIST_FILE: YES
      CURRENT_PROJECT_VERSION: 1
      MARKETING_VERSION: 1.0
      SWIFT_VERSION: 5.0

schemes:
  P2PMessenger:
    build:
      targets:
        P2PMessenger: all
    run:
      config: Debug
      language: ru
    archive:
      config: Release

  P2PMessengerTests:
    build:
      targets:
        P2PMessengerTests: [test]
    test:
      language: ru
      region: RU
      targets:
        - name: P2PMessengerTests
          parallelizable: false

  P2PMessengerUITests:
    build:
      targets:
        P2PMessengerUITests: [test]
    test:
      language: ru
      region: RU
      targets:
        - P2PMessengerUITests
