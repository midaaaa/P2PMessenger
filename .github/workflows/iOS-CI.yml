name: P2PMessenger CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: SwiftLint
    runs-on: macos-14
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install SwiftLint
        run: brew install swiftlint

      - name: Run Linter
        run: swiftlint lint --strict

  build-app:
    name: 🔨 Build App
    runs-on: macos-latest
    needs: [lint]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: 📱 Boot Simulator
        run: |
          brew install jq
          UDID=$(xcrun simctl list devices available -j | \
            jq -r '.devices | to_entries[] | select(.key | contains("26")) | .value[] | select(.name == "iPhone 17") | .udid' | head -n 1)
          if [ -z "$UDID" ]; then
            UDID=$(xcrun simctl list devices available -j | \
              jq -r '.devices | to_entries[] | select(.key | contains("26")) | .value[] | select(.name | startswith("iPhone")) | .udid' | head -n 1)
          fi
          xcrun simctl boot "$UDID" 2>/dev/null || true
          echo "UDID=$UDID" >> $GITHUB_ENV

      - name: Build P2PMessenger
        run: |
          xcodebuild build \
            -project "P2PMessenger.xcodeproj" \
            -scheme "P2PMessenger" \
            -sdk iphonesimulator \
            -destination "platform=iOS Simulator,id=${{ env.UDID }}" \
            ONLY_ACTIVE_ARCH=YES \
            -quiet

  test:
    name: Run Tests
    runs-on: macos-latest
    needs: [build-app]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Boot Simulator
        run: |
          brew install jq
          UDID=$(xcrun simctl list devices available -j | \
            jq -r '.devices | to_entries[] | select(.key | contains("26")) | .value[] | select(.name == "iPhone 17") | .udid' | head -n 1)
          if [ -z "$UDID" ]; then
            UDID=$(xcrun simctl list devices available -j | \
              jq -r '.devices | to_entries[] | select(.key | contains("26")) | .value[] | select(.name | startswith("iPhone")) | .udid' | head -n 1)
          fi
          xcrun simctl boot "$UDID" 2>/dev/null || true
          echo "UDID=$UDID" >> $GITHUB_ENV

      - name: Test P2PMessenger
        run: |
          xcodebuild test \
            -project "P2PMessenger.xcodeproj" \
            -scheme "P2PMessenger" \
            -sdk iphonesimulator \
            -destination "platform=iOS Simulator,id=${{ env.UDID }}" \
            ONLY_ACTIVE_ARCH=YES \
            -quiet

  publish:
    name: Publish Build
    runs-on: macos-latest
    needs: [test]
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Boot Simulator
        run: |
          brew install jq
          UDID=$(xcrun simctl list devices available -j | \
            jq -r '.devices | to_entries[] | select(.key | contains("26")) | .value[] | select(.name == "iPhone 17") | .udid' | head -n 1)
          if [ -z "$UDID" ]; then
            UDID=$(xcrun simctl list devices available -j | \
              jq -r '.devices | to_entries[] | select(.key | contains("26")) | .value[] | select(.name | startswith("iPhone")) | .udid' | head -n 1)
          fi
          xcrun simctl boot "$UDID" 2>/dev/null || true
          echo "UDID=$UDID" >> $GITHUB_ENV

      - name: Build for Artifact
        run: |
          xcodebuild build \
            -project "P2PMessenger.xcodeproj" \
            -scheme "P2PMessenger" \
            -sdk iphonesimulator \
            -destination "platform=iOS Simulator,id=${{ env.UDID }}" \
            ONLY_ACTIVE_ARCH=YES \
            -quiet

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: P2PMessenger-Build-${{ github.run_number }}
          path: ~/Library/Developer/Xcode/DerivedData/**/Build/Products/Debug-iphonesimulator/P2PMessenger.app
          retention-days: 14
          if-no-files-found: warn
