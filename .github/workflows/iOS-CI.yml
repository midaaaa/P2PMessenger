name: P2PMessenger CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build P2PMessenger
    runs-on: macos-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Cache SPM dependencies
        uses: actions/cache@v4
        with:
          path: ~/.build
          key: ${{ runner.os }}-spm-${{ hashFiles('**/Package.resolved') }}
          restore-keys: |
            ${{ runner.os }}-spm-

      - name: Boot Simulator
        run: |
          RUNTIME=$(xcrun simctl list runtimes available -j | jq -r '.runtimes[] | select(.name | contains("17")) | .identifier' | head -n 1)
          if [ -z "$RUNTIME" ]; then
            RUNTIME=$(xcrun simctl list runtimes available -j | jq -r '.runtimes[] | select(.isAvailable == true) | .identifier' | head -n 1)
          fi
          echo "Using runtime: $RUNTIME"
          
          UDID=$(xcrun simctl create "CI iPhone 15" "com.apple.CoreSimulator.SimDeviceType.iPhone-15" "$RUNTIME")
          xcrun simctl boot "$UDID"
          echo "UDID=$UDID" >> $GITHUB_ENV

      - name: Build P2PMessenger
        run: |
          xcodebuild build-for-testing \
            -project "P2PMessenger.xcodeproj" \
            -scheme "P2PMessenger" \
            -sdk iphonesimulator \
            -destination "platform=iOS Simulator,id=${{ env.UDID }}" \
            ONLY_ACTIVE_ARCH=YES \
            -quiet

      - name: Run Tests
        run: |
          xcodebuild test-without-building \
            -project "P2PMessenger.xcodeproj" \
            -scheme "P2PMessenger" \
            -sdk iphonesimulator \
            -destination "platform=iOS Simulator,id=${{ env.UDID }}" \
            ONLY_ACTIVE_ARCH=YES \
            -quiet
        if: false # Выключено, пока тестов нет

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: P2PMessenger-Build
          path: ~/Library/Developer/Xcode/DerivedData/**/Build/Products/Debug-iphonesimulator/P2PMessenger.app
          retention-days: 7
          if-no-files-found: warn
