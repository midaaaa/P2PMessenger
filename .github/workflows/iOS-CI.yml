# .github/workflows/iOS-CI.yml
name: P2PMessenger CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: SwiftLint
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Cache Homebrew
        id: cache-brew
        uses: actions/cache@v4
        with:
          path: ~/Library/Caches/Homebrew
          key: ${{ runner.os }}-brew-lint-v3-${{ hashFiles('.github/Makefile') }}

      - name: Install Tools
        run: |
          brew install swiftlint xcbeautify

      - name: Run Linter
        run: set -o pipefail && swiftlint lint --strict | xcbeautify --renderer github-actions

  build-app:
    name: Build App
    runs-on: macos-latest
    needs: [lint]
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Cache Homebrew
        id: cache-brew
        uses: actions/cache@v4
        with:
          path: ~/Library/Caches/Homebrew
          key: ${{ runner.os }}-brew-build-v3-${{ hashFiles('.github/Makefile') }}

      - name: Install Tools
        run: |
          brew install xcodegen xcbeautify jq

      - name: Select Simulator
        run: |
          SIMULATOR_NAME=$(xcrun simctl list devices available -j | jq -r '
            .devices | to_entries 
            | map(select(.key | contains("iOS"))) 
            | sort_by(.key) | last 
            | .value | map(select(.name | contains("iPhone"))) 
            | first | .name
          ')
          if [ -z "$SIMULATOR_NAME" ]; then
            echo "No available iPhone simulator found"
            exit 1
          fi
          echo "Selected Simulator: $SIMULATOR_NAME"
          echo "SIMULATOR_NAME=$SIMULATOR_NAME" >> $GITHUB_ENV

      - name: Cache DerivedData
        uses: actions/cache@v4
        with:
          path: ~/Library/Developer/Xcode/DerivedData
          key: ${{ runner.os }}-derived-data-${{ hashFiles('project.yml') }}
          restore-keys: |
            ${{ runner.os }}-derived-data-

      - name: Generate Xcode Project
        run: make -f .github/Makefile setup

      - name: Build P2PMessenger
        run: |
          set -o pipefail && xcodebuild build \
            -project "P2PMessenger.xcodeproj" \
            -scheme "P2PMessenger" \
            -sdk iphonesimulator \
            -destination "platform=iOS Simulator,name=${{ env.SIMULATOR_NAME }}" \
            ONLY_ACTIVE_ARCH=YES | xcbeautify --renderer github-actions

  test-unit:
    name: Unit Tests
    runs-on: macos-latest
    needs: [build-app]
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Cache Homebrew
        id: cache-brew
        uses: actions/cache@v4
        with:
          path: ~/Library/Caches/Homebrew
          key: ${{ runner.os }}-brew-build-v3-${{ hashFiles('.github/Makefile') }}

      - name: Install Tools
        run: |
          brew install xcodegen xcbeautify jq

      - name: Select Simulator
        run: |
          SIMULATOR_NAME=$(xcrun simctl list devices available -j | jq -r '
            .devices | to_entries 
            | map(select(.key | contains("iOS"))) 
            | sort_by(.key) | last 
            | .value | map(select(.name | contains("iPhone"))) 
            | first | .name
          ')
          if [ -z "$SIMULATOR_NAME" ]; then
            echo "No available iPhone simulator found"
            exit 1
          fi
          echo "Selected Simulator: $SIMULATOR_NAME"
          echo "SIMULATOR_NAME=$SIMULATOR_NAME" >> $GITHUB_ENV

      - name: Cache DerivedData
        uses: actions/cache@v4
        with:
          path: ~/Library/Developer/Xcode/DerivedData
          key: ${{ runner.os }}-derived-data-${{ hashFiles('project.yml') }}
          restore-keys: |
            ${{ runner.os }}-derived-data-

      - name: Generate Xcode Project
        run: make -f .github/Makefile setup

      - name: Run Unit Tests
        run: |
          set -o pipefail && xcodebuild test \
            -project "P2PMessenger.xcodeproj" \
            -scheme "P2PMessengerTests" \
            -sdk iphonesimulator \
            -destination "platform=iOS Simulator,name=${{ env.SIMULATOR_NAME }}" \
            ONLY_ACTIVE_ARCH=YES \
            -parallel-testing-enabled YES \
            -parallel-testing-worker-count 2 | xcbeautify --renderer github-actions
            
  test-ui:
    name: UI Tests
    runs-on: macos-latest
    needs: [test-unit]
    timeout-minutes: 20
    #if: github.ref == 'refs/heads/main' 
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Cache Homebrew
        id: cache-brew
        uses: actions/cache@v4
        with:
          path: ~/Library/Caches/Homebrew
          key: ${{ runner.os }}-brew-build-v3-${{ hashFiles('.github/Makefile') }}

      - name: Install Tools
        run: |
          brew install xcodegen xcbeautify jq

      - name: Select Simulator
        run: |
          SIMULATOR_NAME=$(xcrun simctl list devices available -j | jq -r '
            .devices | to_entries 
            | map(select(.key | contains("iOS"))) 
            | sort_by(.key) | last 
            | .value | map(select(.name | contains("iPhone"))) 
            | first | .name
          ')
          if [ -z "$SIMULATOR_NAME" ]; then
            echo "No available iPhone simulator found"
            exit 1
          fi
          echo "Selected Simulator: $SIMULATOR_NAME"
          echo "SIMULATOR_NAME=$SIMULATOR_NAME" >> $GITHUB_ENV

      - name: Cache DerivedData
        uses: actions/cache@v4
        with:
          path: ~/Library/Developer/Xcode/DerivedData
          key: ${{ runner.os }}-derived-data-${{ hashFiles('project.yml') }}
          restore-keys: |
            ${{ runner.os }}-derived-data-

      - name: Generate Xcode Project
        run: make -f .github/Makefile setup

      - name: Run UI Tests
        run: |
          set -o pipefail && xcodebuild test \
            -project "P2PMessenger.xcodeproj" \
            -scheme "P2PMessengerUITests" \
            -sdk iphonesimulator \
            -destination "platform=iOS Simulator,name=${{ env.SIMULATOR_NAME }}" \
            ONLY_ACTIVE_ARCH=YES \
            -parallel-testing-enabled YES \
            -parallel-testing-worker-count 1 | xcbeautify --renderer github-actions

  publish:
    name: Publish Build
    runs-on: macos-latest
    needs: [test-unit, test-ui] 
    timeout-minutes: 20
    # if: github.ref == 'refs/heads/main'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Cache Homebrew
        id: cache-brew
        uses: actions/cache@v4
        with:
          path: ~/Library/Caches/Homebrew
          key: ${{ runner.os }}-brew-build-v3-${{ hashFiles('.github/Makefile') }}

      - name: Install Tools
        run: |
          brew install xcodegen xcbeautify jq

      - name: Select Simulator
        run: |
          SIMULATOR_NAME=$(xcrun simctl list devices available -j | jq -r '
            .devices | to_entries 
            | map(select(.key | contains("iOS"))) 
            | sort_by(.key) | last 
            | .value | map(select(.name | contains("iPhone"))) 
            | first | .name
          ')
          if [ -z "$SIMULATOR_NAME" ]; then
            echo "No available iPhone simulator found"
            exit 1
          fi
          echo "Selected Simulator: $SIMULATOR_NAME"
          echo "SIMULATOR_NAME=$SIMULATOR_NAME" >> $GITHUB_ENV

      - name: Cache DerivedData
        uses: actions/cache@v4
        with:
          path: ~/Library/Developer/Xcode/DerivedData
          key: ${{ runner.os }}-derived-data-${{ hashFiles('project.yml') }}
          restore-keys: |
            ${{ runner.os }}-derived-data-

      - name: Generate Xcode Project
        run: make -f .github/Makefile setup

      - name: Build for Artifact
        run: |
          set -o pipefail && xcodebuild build \
            -project "P2PMessenger.xcodeproj" \
            -scheme "P2PMessenger" \
            -sdk iphonesimulator \
            -destination "platform=iOS Simulator,name=${{ env.SIMULATOR_NAME }}" \
            ONLY_ACTIVE_ARCH=YES | xcbeautify --renderer github-actions

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: P2PMessenger-Build-${{ github.run_number }}
          path: ~/Library/Developer/Xcode/DerivedData/**/Build/Products/Debug-iphonesimulator/P2PMessenger.app
          retention-days: 14
          if-no-files-found: warn
