# .github/workflows/iOS-CI.yml
name: P2PMessenger CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: SwiftLint
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install SwiftLint
        run: brew install swiftlint

      - name: Run Linter
        run: swiftlint lint --strict

  build-app:
    name: Build App
    runs-on: macos-latest
    needs: [lint]
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Generate Xcode Project
        run: make -f .github/Makefile setup

      - name: Build P2PMessenger
        run: |
          xcodebuild build \
            -project "P2PMessenger.xcodeproj" \
            -scheme "P2PMessenger" \
            -sdk iphonesimulator \
            -destination "platform=iOS Simulator,name=iPhone 15" \
            ONLY_ACTIVE_ARCH=YES

  test-unit:
    name: Unit Tests
    runs-on: macos-latest
    needs: [build-app]
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Generate Xcode Project
        run: make -f .github/Makefile setup

      - name: Run Unit Tests
        run: |
          xcodebuild test \
            -project "P2PMessenger.xcodeproj" \
            -scheme "P2PMessengerTests" \
            -sdk iphonesimulator \
            -destination "platform=iOS Simulator,name=iPhone 15" \
            ONLY_ACTIVE_ARCH=YES \
            -parallel-testing-enabled YES \
            -parallel-testing-worker-count 2
            
  test-ui:
    name: UI Tests
    runs-on: macos-latest
    needs: [test-unit]
    timeout-minutes: 20
    if: github.ref == 'refs/heads/main' 
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Generate Xcode Project
        run: make -f .github/Makefile setup

      - name: Run UI Tests
        run: |
          xcodebuild test \
            -project "P2PMessenger.xcodeproj" \
            -scheme "P2PMessengerUITests" \
            -sdk iphonesimulator \
            -destination "platform=iOS Simulator,name=iPhone 15" \
            ONLY_ACTIVE_ARCH=YES \
            -parallel-testing-enabled YES \
            -parallel-testing-worker-count 2

  publish:
    name: Publish Build
    runs-on: macos-latest
    needs: [test-unit, test-ui] 
    timeout-minutes: 20
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Generate Xcode Project
        run: make -f .github/Makefile setup

      - name: Build for Artifact
        run: |
          xcodebuild build \
            -project "P2PMessenger.xcodeproj" \
            -scheme "P2PMessenger" \
            -sdk iphonesimulator \
            -destination "platform=iOS Simulator,name=iPhone 15" \
            ONLY_ACTIVE_ARCH=YES

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: P2PMessenger-Build-${{ github.run_number }}
          path: ~/Library/Developer/Xcode/DerivedData/**/Build/Products/Debug-iphonesimulator/P2PMessenger.app
          retention-days: 14
          if-no-files-found: warn
