# .github/workflows/iOS-CI.yml
name: P2PMessenger CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: SwiftLint
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Cache Homebrew
        id: cache-brew
        uses: actions/cache@v4
        with:
          path: |
            ~/Library/Caches/Homebrew
            /usr/local/bin/swiftlint
            /usr/local/bin/xcbeautify
          key: ${{ runner.os }}-brew-lint-${{ hashFiles('.github/Makefile') }}

      - name: Install Tools
        if: steps.cache-brew.outputs.cache-hit != 'true'
        run: |
          brew install swiftlint xcbeautify

      - name: Run Linter
        run: swiftlint lint --strict | xcbeautify --renderer github-actions

  build-app:
    name: Build App
    runs-on: macos-latest
    needs: [lint]
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Cache Homebrew
        id: cache-brew
        uses: actions/cache@v4
        with:
          path: |
            ~/Library/Caches/Homebrew
            /usr/local/bin/xcodegen
            /usr/local/bin/xcbeautify
          key: ${{ runner.os }}-brew-build-${{ hashFiles('.github/Makefile') }}

      - name: Install Tools
        if: steps.cache-brew.outputs.cache-hit != 'true'
        run: |
          brew install xcodegen xcbeautify

      - name: Cache DerivedData
        uses: actions/cache@v4
        with:
          path: ~/Library/Developer/Xcode/DerivedData
          key: ${{ runner.os }}-derived-data-${{ hashFiles('project.yml') }}
          restore-keys: |
            ${{ runner.os }}-derived-data-

      - name: Generate Xcode Project
        run: make -f .github/Makefile setup

      - name: Build P2PMessenger
        run: |
          set -o pipefail && xcodebuild build \
            -project "P2PMessenger.xcodeproj" \
            -scheme "P2PMessenger" \
            -sdk iphonesimulator \
            -destination "platform=iOS Simulator,name=iPhone 15" \
            ONLY_ACTIVE_ARCH=YES | xcbeautify --renderer github-actions

  test-unit:
    name: Unit Tests
    runs-on: macos-latest
    needs: [build-app]
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Cache Homebrew
        id: cache-brew
        uses: actions/cache@v4
        with:
          path: |
            ~/Library/Caches/Homebrew
            /usr/local/bin/xcodegen
            /usr/local/bin/xcbeautify
          key: ${{ runner.os }}-brew-build-${{ hashFiles('.github/Makefile') }}

      - name: Install Tools
        if: steps.cache-brew.outputs.cache-hit != 'true'
        run: |
          brew install xcodegen xcbeautify

      - name: Cache DerivedData
        uses: actions/cache@v4
        with:
          path: ~/Library/Developer/Xcode/DerivedData
          key: ${{ runner.os }}-derived-data-${{ hashFiles('project.yml') }}
          restore-keys: |
            ${{ runner.os }}-derived-data-

      - name: Generate Xcode Project
        run: make -f .github/Makefile setup

      - name: Run Unit Tests
        run: |
          set -o pipefail && xcodebuild test \
            -project "P2PMessenger.xcodeproj" \
            -scheme "P2PMessengerTests" \
            -sdk iphonesimulator \
            -destination "platform=iOS Simulator,name=iPhone 15" \
            ONLY_ACTIVE_ARCH=YES \
            -parallel-testing-enabled YES \
            -parallel-testing-worker-count 2 | xcbeautify --renderer github-actions
            
  test-ui:
    name: UI Tests
    runs-on: macos-latest
    needs: [test-unit]
    timeout-minutes: 20
    if: github.ref == 'refs/heads/main' 
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Cache Homebrew
        id: cache-brew
        uses: actions/cache@v4
        with:
          path: |
            ~/Library/Caches/Homebrew
            /usr/local/bin/xcodegen
            /usr/local/bin/xcbeautify
          key: ${{ runner.os }}-brew-build-${{ hashFiles('.github/Makefile') }}

      - name: Install Tools
        if: steps.cache-brew.outputs.cache-hit != 'true'
        run: |
          brew install xcodegen xcbeautify

      - name: Cache DerivedData
        uses: actions/cache@v4
        with:
          path: ~/Library/Developer/Xcode/DerivedData
          key: ${{ runner.os }}-derived-data-${{ hashFiles('project.yml') }}
          restore-keys: |
            ${{ runner.os }}-derived-data-

      - name: Generate Xcode Project
        run: make -f .github/Makefile setup

      - name: Run UI Tests
        run: |
          set -o pipefail && xcodebuild test \
            -project "P2PMessenger.xcodeproj" \
            -scheme "P2PMessengerUITests" \
            -sdk iphonesimulator \
            -destination "platform=iOS Simulator,name=iPhone 15" \
            ONLY_ACTIVE_ARCH=YES \
            -parallel-testing-enabled YES \
            -parallel-testing-worker-count 2 | xcbeautify --renderer github-actions

  publish:
    name: Publish Build
    runs-on: macos-latest
    needs: [test-unit, test-ui] 
    timeout-minutes: 20
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Cache Homebrew
        id: cache-brew
        uses: actions/cache@v4
        with:
          path: |
            ~/Library/Caches/Homebrew
            /usr/local/bin/xcodegen
            /usr/local/bin/xcbeautify
          key: ${{ runner.os }}-brew-build-${{ hashFiles('.github/Makefile') }}

      - name: Install Tools
        if: steps.cache-brew.outputs.cache-hit != 'true'
        run: |
          brew install xcodegen xcbeautify

      - name: Cache DerivedData
        uses: actions/cache@v4
        with:
          path: ~/Library/Developer/Xcode/DerivedData
          key: ${{ runner.os }}-derived-data-${{ hashFiles('project.yml') }}
          restore-keys: |
            ${{ runner.os }}-derived-data-

      - name: Generate Xcode Project
        run: make -f .github/Makefile setup

      - name: Build for Artifact
        run: |
          set -o pipefail && xcodebuild build \
            -project "P2PMessenger.xcodeproj" \
            -scheme "P2PMessenger" \
            -sdk iphonesimulator \
            -destination "platform=iOS Simulator,name=iPhone 15" \
            ONLY_ACTIVE_ARCH=YES | xcbeautify --renderer github-actions

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: P2PMessenger-Build-${{ github.run_number }}
          path: ~/Library/Developer/Xcode/DerivedData/**/Build/Products/Debug-iphonesimulator/P2PMessenger.app
          retention-days: 14
          if-no-files-found: warn
