# .swiftlint.yml

disabled_rules:
  - line_length
  - type_body_length
  - file_length
  - function_body_length

opt_in_rules:
  - empty_count
  - force_unwrapping

included:
  - P2PMessenger
  - P2PMessengerTests
  - P2PMessengerUITests

excluded:
  - Pods
  - DerivedData
  - .build

identifier_name:
  min_length: 1
  max_length: 100
  allowed_symbols: ["_"]
  validates_start_with_lowercase: false
